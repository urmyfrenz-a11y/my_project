<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 채팅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">

    <!-- ── Sidebar ─────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="app-logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">AI 채팅</span>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          새 대화
        </button>
      </div>

      <div class="sidebar-content">
        <p class="history-title">최근 대화</p>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="sidebar-footer">
        <span class="version-info">Powered by Claude API</span>
      </div>
    </aside>

    <!-- Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── Main ────────────────────────────────── -->
    <main class="main-content">

      <!-- Header -->
      <header class="chat-header">
        <button class="icon-btn" id="menuToggle" aria-label="메뉴">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="header-center">
          <span class="model-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            Claude
          </span>
        </div>

        <button class="icon-btn" id="clearChatBtn" aria-label="대화 초기화" title="대화 초기화">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
        </button>
      </header>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea">
        <!-- Welcome -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-glow"></div>
          <div class="welcome-icon">✦</div>
          <h1 class="welcome-title">무엇을 도와드릴까요?</h1>
          <p class="welcome-sub">질문하거나 대화를 시작해보세요</p>
          <div class="chips-grid">
            <button class="chip" data-text="오늘 점심 메뉴 좀 추천해줘">🍱 점심 메뉴 추천</button>
            <button class="chip" data-text="파이썬으로 간단한 계산기를 만들어줘">💻 파이썬 코드 작성</button>
            <button class="chip" data-text="좋은 이메일 작성하는 팁을 알려줘">✉️ 이메일 작성 팁</button>
            <button class="chip" data-text="요즘 기분이 별로야. 위로해줘">💬 일상 대화하기</button>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-section">

        <!-- PDF 컨텍스트 배지 (업로드 후 표시) -->
        <div class="pdf-badge-wrap" id="pdfBadgeWrap" style="display:none">
          <div class="pdf-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            <span id="pdfBadgeName"></span>
            <span id="pdfBadgePages" class="pdf-badge-pages"></span>
            <button class="pdf-badge-remove" id="pdfRemoveBtn" title="PDF 제거">×</button>
          </div>
          <span class="pdf-badge-hint">PDF 내용을 참고해 답변합니다</span>
        </div>

        <div class="input-box" id="inputBox">
          <!-- PDF 업로드 버튼 -->
          <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
          <button class="pdf-upload-btn" id="pdfUploadBtn" title="PDF 파일 첨부">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </button>

          <div class="textarea-wrap">
            <textarea
              id="messageInput"
              placeholder="메시지를 입력하세요…"
              rows="1"
              maxlength="10000"
            ></textarea>
          </div>
          <button class="send-btn" id="sendBtn" disabled aria-label="전송">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">AI는 실수할 수 있습니다. 중요한 정보는 반드시 확인하세요.</p>
      </div>

    </main>
  </div>

  <!-- PDF.js: 브라우저에서 직접 PDF 텍스트 추출 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
